services:
  translation-service:
    image: ghcr.io/pulsarpoint/corpscout-translation-service:${SERVICES_IMAGE_TAG:-latest}
    build:
      context: ./translation-service
      dockerfile: Dockerfile
    env_file:
      - path: ./translation-service/.env
        required: false
    ports:
      - "${TRANSLATION_SERVICE_PORT:-8095}:8095"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/healthz', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  crawl-service:
    image: ghcr.io/pulsarpoint/corpscout-crawl-service:${SERVICES_IMAGE_TAG:-latest}
    build:
      context: ./crawl-service
      dockerfile: Dockerfile
    env_file:
      - path: ./crawl-service/.env
        required: false
    ports:
      - "${CRAWL_SERVICE_PORT:-8096}:8096"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/healthz', timeout=5).read()"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
