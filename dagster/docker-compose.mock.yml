x-mock-dagster-base: &mock-dagster-base
  image: ${DAGSTER_IMAGE:-corpscout-dagster:mock}
  build:
    context: .
  env_file:
    - path: .env.mock
      required: false
  environment:
    DAGSTER_HOME: /opt/dagster/dagster_home
    CORPSCOUT_DATABASE_URL: ${CORPSCOUT_DATABASE_URL:-postgresql://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable}
    TRANSLATION_SERVICE_URL: ${TRANSLATION_SERVICE_URL:-http://translation-service:8095}
    CRAWL_SERVICE_URL: ${CRAWL_SERVICE_URL:-http://crawl-service:8096}
    BRREG_BULK_FIXTURE_PATH: ${BRREG_BULK_FIXTURE_PATH:-/fixtures/brreg_raw_records_1000.json.gz}
    BRREG_FX_PROVIDER: ${BRREG_FX_PROVIDER:-mock}
  volumes:
    - ${DAGSTER_HOME_DIR:-./.dagster_home_mock}:/opt/dagster/dagster_home
    - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    - ./fixtures:/fixtures:ro

x-mock-migrate-base: &mock-migrate-base
  image: ${MIGRATE_IMAGE:-migrate/migrate}
  depends_on:
    postgres:
      condition: service_healthy
  volumes:
    - ./db/migrations:/migrations:ro

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: corpscout
      POSTGRES_USER: corpscout
      POSTGRES_PASSWORD: corpscout
    ports:
      - ${MOCK_POSTGRES_PORT:-15432}:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corpscout -d corpscout"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - dagster_mock_postgres:/var/lib/postgresql/data

  translation-service:
    image: ${TRANSLATION_SERVICE_IMAGE:-corpscout-translation-service:mock}
    build:
      context: ../services/translation-service
    env_file:
      - path: .env.mock
        required: false
    environment:
      TRANSLATION_MOCK_ENABLED: ${TRANSLATION_MOCK_ENABLED:-true}
      TRANSLATION_DEFAULT_PROVIDER: ${TRANSLATION_DEFAULT_PROVIDER:-mock}
      TRANSLATION_DEFAULT_MODEL: ${TRANSLATION_DEFAULT_MODEL:-mock-model}
      MOCK_SEED: ${MOCK_SEED:-brreg-e2e-v1}
      MOCK_PROFILE: ${MOCK_PROFILE:-mixed}
    ports:
      - ${TRANSLATION_SERVICE_PORT:-18095}:8095
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/healthz', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 20

  crawl-service:
    image: ${CRAWL_SERVICE_IMAGE:-corpscout-crawl-service:mock}
    build:
      context: ../services/crawl-service
    env_file:
      - path: .env.mock
        required: false
    environment:
      CRAWL_SERVICE_MODE: ${CRAWL_SERVICE_MODE:-mock}
      CRAWL_SERVICE_MOCK_ENABLED: ${CRAWL_SERVICE_MOCK_ENABLED:-true}
      MOCK_SEED: ${MOCK_SEED:-brreg-e2e-v1}
      MOCK_PROFILE: ${MOCK_PROFILE:-mixed}
    ports:
      - ${CRAWL_SERVICE_PORT:-18096}:8096
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/healthz', timeout=5)"
      interval: 5s
      timeout: 5s
      retries: 20

  dagster-migrate:
    <<: *mock-migrate-base
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - up

  dagster-webserver:
    <<: *mock-dagster-base
    depends_on:
      dagster-migrate:
        condition: service_completed_successfully
      translation-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
    ports:
      - ${DAGSTER_PORT:-3001}:${DAGSTER_WEBSERVER_PORT:-3000}
    command: >
      sh -c 'mkdir -p "$$DAGSTER_HOME" &&
      dagster-webserver -h 0.0.0.0 -p "$${DAGSTER_WEBSERVER_PORT:-3000}" -w /app/workspace.yaml'

  dagster-daemon:
    <<: *mock-dagster-base
    depends_on:
      dagster-migrate:
        condition: service_completed_successfully
      translation-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
    command: >
      sh -c 'mkdir -p "$$DAGSTER_HOME" &&
      dagster-daemon run -w /app/workspace.yaml'

  dagster-migrate-up:
    <<: *mock-migrate-base
    profiles:
      - tools
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - up

  dagster-migrate-version:
    <<: *mock-migrate-base
    profiles:
      - tools
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:corpscout@postgres:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - version

volumes:
  dagster_mock_postgres:
