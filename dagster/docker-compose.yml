x-dagster-migrate-base: &dagster-migrate-base
  image: ${MIGRATE_IMAGE:-migrate/migrate}
  extra_hosts:
    - companycollect:100.85.212.113
  volumes:
    - ./db/migrations:/migrations:ro

services:
  dagster-webserver:
    image: ${DAGSTER_IMAGE:-ghcr.io/pulsarpoint/corpscout-dagster:latest}
    restart: always
    depends_on:
      dagster-migrate:
        condition: service_completed_successfully
      translation-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      DAGSTER_WEBSERVER_HOST: 0.0.0.0
      DAGSTER_WEBSERVER_PORT: ${DAGSTER_PORT:-3000}
      CORPSCOUT_DATABASE_URL: ${CORPSCOUT_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable}
      TRANSLATION_SERVICE_URL: ${TRANSLATION_SERVICE_URL:-http://translation-service:8095}
      CRAWL_SERVICE_URL: ${CRAWL_SERVICE_URL:-http://crawl-service:8096}
    extra_hosts:
      - companycollect:100.85.212.113
    ports:
      - ${DAGSTER_PORT:-3000}:${DAGSTER_WEBSERVER_PORT:-3000}
    volumes:
      - ${DAGSTER_HOME_DIR:-./.dagster_home}:/opt/dagster/dagster_home
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    command: >
      sh -c 'mkdir -p "$$DAGSTER_HOME" &&
      dagster-webserver -h 0.0.0.0 -p "$${DAGSTER_WEBSERVER_PORT:-3000}" -w /app/workspace.yaml'

  dagster-daemon:
    image: ${DAGSTER_IMAGE:-ghcr.io/pulsarpoint/corpscout-dagster:latest}
    restart: always
    depends_on:
      dagster-migrate:
        condition: service_completed_successfully
      translation-service:
        condition: service_healthy
      crawl-service:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      DAGSTER_HOME: /opt/dagster/dagster_home
      CORPSCOUT_DATABASE_URL: ${CORPSCOUT_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable}
      TRANSLATION_SERVICE_URL: ${TRANSLATION_SERVICE_URL:-http://translation-service:8095}
      CRAWL_SERVICE_URL: ${CRAWL_SERVICE_URL:-http://crawl-service:8096}
    extra_hosts:
      - companycollect:100.85.212.113
    volumes:
      - ${DAGSTER_HOME_DIR:-./.dagster_home}:/opt/dagster/dagster_home
      - ./dagster.yaml:/opt/dagster/dagster_home/dagster.yaml:ro
    command: >
      sh -c 'mkdir -p "$$DAGSTER_HOME" &&
      dagster-daemon run -w /app/workspace.yaml'

  translation-service:
    image: ${TRANSLATION_SERVICE_IMAGE:-ghcr.io/pulsarpoint/corpscout-translation-service:latest}
    restart: always
    env_file:
      - path: .env
        required: false
    ports:
      - ${TRANSLATION_SERVICE_PORT:-8095}:8095
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8095/healthz', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  crawl-service:
    image: ${CRAWL_SERVICE_IMAGE:-ghcr.io/pulsarpoint/corpscout-crawl-service:latest}
    restart: always
    env_file:
      - path: .env
        required: false
    ports:
      - ${CRAWL_SERVICE_PORT:-8096}:8096
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8096/healthz', timeout=5)"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  dagster-migrate:
    <<: *dagster-migrate-base
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - up

  dagster-migrate-up:
    <<: *dagster-migrate-base
    profiles:
      - tools
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - up

  dagster-migrate-down:
    <<: *dagster-migrate-base
    profiles:
      - tools
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - down
      - "1"

  dagster-migrate-version:
    <<: *dagster-migrate-base
    profiles:
      - tools
    command:
      - -path=/migrations
      - -database
      - ${DAGSTER_MIGRATIONS_DATABASE_URL:-postgresql://corpscout:password123@companycollect:5432/corpscout?sslmode=disable&x-migrations-table=dagster_schema_migrations}
      - version
